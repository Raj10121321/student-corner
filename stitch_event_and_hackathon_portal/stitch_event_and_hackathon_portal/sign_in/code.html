<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | TechNexus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1326;
            margin: 0;
            overflow-x: hidden;
        }
        .auth-card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }
        .glow-border:focus-within {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1326;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3449;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #464554;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#c0c1ff",
                        "inverse-surface": "#dae2fd",
                        "tertiary-container": "#00885d",
                        "tertiary": "#4edea3",
                        "primary-container": "#8083ff",
                        "on-primary-fixed": "#07006c",
                        "surface-container": "#171f33",
                        "surface-tint": "#c0c1ff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "background": "#0b1326",
                        "surface-container-lowest": "#060e20",
                        "on-tertiary-fixed": "#002113",
                        "surface-container-low": "#131b2e",
                        "surface-bright": "#31394d",
                        "outline-variant": "#464554",
                        "surface-container-high": "#222a3d",
                        "inverse-on-surface": "#283044",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#2d3449",
                        "surface-dim": "#0b1326",
                        "on-secondary-container": "#e6ecff",
                        "on-secondary-fixed": "#001a42",
                        "secondary-fixed-dim": "#adc6ff",
                        "secondary-fixed": "#d8e2ff",
                        "on-secondary": "#002e6a",
                        "outline": "#908fa0",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-tertiary": "#003824",
                        "error": "#ffb4ab",
                        "on-surface": "#dae2fd",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-error": "#690005",
                        "on-primary-container": "#0d0096",
                        "on-surface-variant": "#c7c4d7",
                        "error-container": "#93000a",
                        "on-background": "#dae2fd",
                        "surface-variant": "#2d3449",
                        "surface": "#0b1326",
                        "primary": "#c0c1ff",
                        "inverse-primary": "#494bd6",
                        "on-secondary-fixed-variant": "#004395",
                        "on-tertiary-container": "#000703",
                        "primary-fixed": "#e1e0ff",
                        "secondary-container": "#0566d9",
                        "secondary": "#adc6ff",
                        "tertiary-fixed": "#6ffbbe",
                        "on-primary": "#1000a9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "stack-sm": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "48px",
                        "stack-md": "16px",
                        "base-unit": "4px",
                        "container-max": "1280px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "button-text": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-mono": ["JetBrains Mono"],
                        "headline-xl": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "button-text": ["15px", {"lineHeight": "16px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-mono": ["13px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background selection:bg-primary/30 min-h-screen flex flex-col">
<!-- Auth Layout Wrapper -->
<main class="flex-grow flex items-center justify-center relative px-margin-mobile py-stack-lg overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] rounded-full bg-primary-container blur-[100px]"></div>
</div>
<!-- Animated Background Component -->
<div class="absolute inset-0 z-0">

</div>
<!-- Auth Card Container -->
<div class="relative z-10 w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Logo -->
<div class="flex justify-center mb-stack-lg">
<div class="flex items-center gap-2 group cursor-default">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="font-headline-md text-headline-md font-bold tracking-tight text-on-surface">TechNexus</span>
</div>
</div>
<!-- Main Auth Card -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-8 md:p-10 auth-card-shadow">
<header class="text-center mb-8">
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your technical events.</p>
</header>
<!-- Social Login Options -->
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-lg bg-surface-container-highest border border-outline-variant hover:bg-surface-bright transition-all active:scale-95 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="cloud"></span>
<span class="font-button-text text-button-text text-on-surface">Github</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-lg bg-surface-container-highest border border-outline-variant hover:bg-surface-bright transition-all active:scale-95 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="google"></span>
<span class="font-button-text text-button-text text-on-surface">Google</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-mono text-label-mono text-outline uppercase">Or email</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-mono text-label-mono text-on-surface-variant ml-1" for="email">WORK EMAIL</label>
<div class="relative glow-border">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-xl" data-icon="mail"></span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-mono text-label-mono text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-mono text-label-mono text-primary hover:text-primary-fixed-dim transition-colors" href="#">FORGOT?</a>
</div>
<div class="relative glow-border">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-xl" data-icon="lock"></span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3.5 pl-12 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility"></span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary-container hover:bg-secondary-container/90 text-on-secondary-container font-button-text text-button-text py-4 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] mt-4" type="submit">
<span>Sign In to Console</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward"></span>
</button>
</form>
<!-- Signup Link -->
<footer class="mt-8 pt-6 border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline underline-offset-4 decoration-primary/40" href="#">Register here</a>
</p>
</footer>
</div>
<!-- Footer Meta Links -->
<div class="mt-8 flex flex-wrap justify-center gap-x-6 gap-y-2 opacity-60">
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors" href="#">Status</a>
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors" href="#">Docs</a>
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors" href="#">Terms</a>
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy</a>
</div>
</div>
</main>
<!-- Micro-interaction Scripts -->
<script>
        // Password toggle visibility
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        
        toggleBtn?.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');
            if (iconSpan) {
                iconSpan.textContent = isPassword ? 'visibility_off' : 'visibility';
            }
        });

        // Simple form interaction simulation
        const loginForm = document.querySelector('form');
        loginForm?.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">progress_activity</span> Authenticating...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Redirecting...`;
                btn.classList.replace('bg-secondary-container', 'bg-tertiary-container');
            }, 1500);
        });
    </script>
</body></html>
